name: Build MiniToo Toolbox for macOS

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:
    inputs:
      release_channel:
        description: "Use a transition channel only for a documented updater bridge."
        required: false
        default: main
        type: choice
        options: [main, personal-transition, main-transition, main-legacy-bridge]

permissions:
  contents: write

concurrency:
  group: main-release
  cancel-in-progress: true

jobs:
  validate-release-channel:
    name: Validate release channel
    runs-on: ubuntu-latest
    steps:
      - name: Reject an unsafe bridge invocation
        if: (inputs.release_channel == 'personal-transition' && github.ref_name != 'personal') || ((inputs.release_channel == 'main-transition' || inputs.release_channel == 'main-legacy-bridge') && github.ref_name != 'main')
        run: |
          echo "Transition releases may only be built from their documented source branch." >&2
          exit 1

  test:
    name: Run unit tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: swift test
        run: swift test

  build:
    name: Build ${{ matrix.label }} slice
    needs: [validate-release-channel, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            label: Apple Silicon
            runner: macos-15
          - arch: x86_64
            label: Intel
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6
      - name: Install NASM for optimized Intel FFmpeg
        if: matrix.arch == 'x86_64'
        run: brew install nasm
      - name: Restore/cache validated FFmpeg
        uses: actions/cache@v4
        with:
          path: |
            build/ffmpeg/ffmpeg
            build/ffmpeg/ffmpeg-8.1.2.tar.xz
            build/ffmpeg/.cache-manifest
          key: ffmpeg-cache-v1-${{ matrix.arch }}-ffmpeg-8.1.2-${{ hashFiles('tools/build-ffmpeg.sh') }}
      - name: Build LGPL-only FFmpeg
        run: bash tools/build-ffmpeg.sh
      - name: Build native app slice
        shell: bash
        run: |
          set -o pipefail
          REQUESTED_CHANNEL="${{ inputs.release_channel || 'main' }}"
          RELEASE_CHANNEL="main"
          RUNTIME_CHANNEL="main"
          VERSION_PREFIX="0.2.0-alpha"
          # Sparkle compares CFBundleVersion, not CFBundleShortVersionString.
          # Legacy public builds reached at least build 39 before the renamed
          # repository began a new Actions run-number sequence. Keep all
          # post-rename builds above that sequence so legacy Main clients can
          # discover the identity-migration release.
          RELEASE_BUILD_NUMBER=$((3000 + GITHUB_RUN_NUMBER))
          TRANSITION_FEED_URL=""
          TRANSITION_CHANNEL=""
          if [[ "$REQUESTED_CHANNEL" == "personal-transition" ]]; then
            RELEASE_CHANNEL="personal"
            RUNTIME_CHANNEL="personal"
            VERSION_PREFIX="0.1.0-alpha"
            RELEASE_BUILD_NUMBER=$((1500 + GITHUB_RUN_NUMBER))
            TRANSITION_FEED_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/main-transition-latest/appcast-main-transition.xml"
            TRANSITION_CHANNEL="main-transition"
          elif [[ "$REQUESTED_CHANNEL" == "main-transition" ]]; then
            RELEASE_CHANNEL="main-transition"
            RELEASE_BUILD_NUMBER=$((2000 + GITHUB_RUN_NUMBER))
          elif [[ "$REQUESTED_CHANNEL" == "main-legacy-bridge" ]]; then
            RELEASE_BUILD_NUMBER=$((2000 + GITHUB_RUN_NUMBER))
          fi
          DIVOOM_ARCHS=${{ matrix.arch }} \
          DIVOOM_APP_VERSION="${VERSION_PREFIX}.${GITHUB_RUN_NUMBER}" \
          DIVOOM_BUILD_VERSION="$RELEASE_BUILD_NUMBER" \
          DIVOOM_SOURCE_REPOSITORY="${GITHUB_REPOSITORY}" \
          DIVOOM_SOURCE_BRANCH="$RUNTIME_CHANNEL" \
          DIVOOM_UPDATE_CHANNEL="$RUNTIME_CHANNEL" \
          DIVOOM_UPDATE_FEED_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${RUNTIME_CHANNEL}-latest/appcast-${RUNTIME_CHANNEL}.xml" \
          DIVOOM_TRANSITION_FEED_URL="$TRANSITION_FEED_URL" \
          DIVOOM_TRANSITION_CHANNEL="$TRANSITION_CHANNEL" \
          DIVOOM_SPARKLE_PUBLIC_KEY="BWqgCW8t6A6R+tPkslx9LKIuU620nJw3w1L1+JhEJTY=" \
          DIVOOM_BUILD_COMMIT="${GITHUB_SHA}" \
          DIVOOM_BUILD_RUN="${GITHUB_RUN_NUMBER}" \
          bash -x tools/build-divoom-app.sh 2>&1 | tee build-divoom-app.log
      - name: Preserve native build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-divoom-app-log-${{ matrix.arch }}
          path: build-divoom-app.log
          retention-days: 7
          if-no-files-found: warn
      - name: Archive native app slice
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "build/MiniToo Toolbox.app" "MiniToo-Toolbox-${{ matrix.arch }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: MiniToo-Toolbox-${{ matrix.arch }}
          path: MiniToo-Toolbox-${{ matrix.arch }}.zip
          retention-days: 30
      - uses: actions/upload-artifact@v4
        if: matrix.arch == 'arm64'
        with:
          name: ffmpeg-8.1.2-source
          path: build/ffmpeg/ffmpeg-8.1.2.tar.xz
          retention-days: 30

  release:
    name: Assemble and publish universal app
    needs: build
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-release.txt
      - name: Install DMG layout builder
        run: python -m pip install -r requirements-release.txt
      - name: Resolve pinned Sparkle release tools
        run: swift package resolve
      - uses: actions/download-artifact@v5
        with:
          name: MiniToo-Toolbox-arm64
          path: arm64
      - uses: actions/download-artifact@v5
        with:
          name: MiniToo-Toolbox-x86_64
          path: x86_64
      - uses: actions/download-artifact@v5
        with:
          name: ffmpeg-8.1.2-source
          path: ffmpeg-source
      - name: Combine architecture-specific resources and binaries
        env:
          CHANNEL: ${{ inputs.release_channel == 'personal-transition' && 'personal' || inputs.release_channel == 'main-transition' && 'main-transition' || 'main' }}
          LEGACY_ARCHIVE: ${{ inputs.release_channel == 'main-transition' || inputs.release_channel == 'main-legacy-bridge' }}
          VERSION_PREFIX: ${{ inputs.release_channel == 'personal-transition' && '0.1.0-alpha' || '0.2.0-alpha' }}
          DIVOOM_SPARKLE_PRIVATE_KEY: ${{ secrets.DIVOOM_SPARKLE_PRIVATE_KEY }}
        run: |
          ditto -x -k arm64/MiniToo-Toolbox-arm64.zip .
          mv "MiniToo Toolbox.app" arm64.app
          ditto -x -k x86_64/MiniToo-Toolbox-x86_64.zip .
          lipo -create \
            "arm64.app/Contents/MacOS/MiniTooToolbox" \
            "MiniToo Toolbox.app/Contents/MacOS/MiniTooToolbox" \
            -output "MiniToo Toolbox.app/Contents/MacOS/MiniTooToolbox"
          lipo -create \
            "arm64.app/Contents/Resources/tools/divoom-daemon" \
            "MiniToo Toolbox.app/Contents/Resources/tools/divoom-daemon" \
            -output "MiniToo Toolbox.app/Contents/Resources/tools/divoom-daemon"
          lipo -create \
            "arm64.app/Contents/Resources/tools/ffmpeg" \
            "MiniToo Toolbox.app/Contents/Resources/tools/ffmpeg" \
            -output "MiniToo Toolbox.app/Contents/Resources/tools/ffmpeg"
          codesign --force --deep --sign - "MiniToo Toolbox.app"
          UPDATE_TAG="${CHANNEL}-update-${GITHUB_RUN_NUMBER}"
          UPDATE_NAME="MiniToo-Toolbox-macos-universal-update-${GITHUB_RUN_NUMBER}.zip"
          UPDATE_DIR="update-feed"
          mkdir -p "$UPDATE_DIR"
          # Sparkle's plain installer finds the source app in an archive by
          # the currently installed bundle name. The one-time rename bridge
          # therefore keeps the archive directory as Divoom MiniToo.app while
          # preserving the new app's signed contents and metadata inside it.
          if [[ "$LEGACY_ARCHIVE" == "true" ]]; then
            LEGACY_UPDATE_ROOT="legacy-update-root"
            mkdir -p "$LEGACY_UPDATE_ROOT"
            ditto "MiniToo Toolbox.app" "$LEGACY_UPDATE_ROOT/Divoom MiniToo.app"
            ditto -c -k --sequesterRsrc --keepParent "$LEGACY_UPDATE_ROOT/Divoom MiniToo.app" "$UPDATE_DIR/$UPDATE_NAME"
          else
            ditto -c -k --sequesterRsrc --keepParent "MiniToo Toolbox.app" "$UPDATE_DIR/$UPDATE_NAME"
          fi
          cp RELEASE_NOTES.md "$UPDATE_DIR/${UPDATE_NAME%.zip}.md"
          printf '%s' "$DIVOOM_SPARKLE_PRIVATE_KEY" | \
            .build/artifacts/sparkle/Sparkle/bin/generate_appcast \
              --ed-key-file - \
              --maximum-versions 1 \
              --maximum-deltas 0 \
              --channel "$CHANNEL" \
              --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${UPDATE_TAG}/" \
              --full-release-notes-url "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${CHANNEL}-latest" \
              -o "$UPDATE_DIR/appcast-${CHANNEL}.xml" \
              "$UPDATE_DIR"
          dmgbuild -s tools/dmgbuild-settings.py "MiniToo Toolbox" MiniToo-Toolbox-macos-universal.dmg
          shasum -a 256 MiniToo-Toolbox-macos-universal.dmg > MiniToo-Toolbox-macos-universal.dmg.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: MiniToo-Toolbox-macos-universal
          path: |
            MiniToo-Toolbox-macos-universal.dmg
            MiniToo-Toolbox-macos-universal.dmg.sha256
            update-feed/MiniToo-Toolbox-macos-universal-update-${{ github.run_number }}.zip
            update-feed/MiniToo-Toolbox-macos-universal-update-${{ github.run_number }}.md
            update-feed/appcast-${{ inputs.release_channel == 'personal-transition' && 'personal' || inputs.release_channel == 'main-transition' && 'main-transition' || 'main' }}.xml
            ffmpeg-source/ffmpeg-8.1.2.tar.xz
          retention-days: 7
      - name: Publish rolling prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          CHANNEL: ${{ inputs.release_channel == 'personal-transition' && 'personal' || inputs.release_channel == 'main-transition' && 'main-transition' || 'main' }}
          VERSION_PREFIX: ${{ inputs.release_channel == 'personal-transition' && '0.1.0-alpha' || '0.2.0-alpha' }}
        run: |
          UPDATE_TAG="${CHANNEL}-update-${GITHUB_RUN_NUMBER}"
          if gh release view "$UPDATE_TAG" >/dev/null 2>&1; then
            gh release upload "$UPDATE_TAG" "update-feed/MiniToo-Toolbox-macos-universal-update-${GITHUB_RUN_NUMBER}.zip" --clobber
          else
            gh release create "$UPDATE_TAG" "update-feed/MiniToo-Toolbox-macos-universal-update-${GITHUB_RUN_NUMBER}.zip" --target "$GITHUB_SHA" --title "${CHANNEL} update ${GITHUB_RUN_NUMBER}" --prerelease --notes "Immutable Sparkle update archive for the ${CHANNEL} channel."
          fi
          if gh release view "${CHANNEL}-latest" >/dev/null 2>&1; then
            # The user-facing artifact changed from ZIP to DMG and was renamed
            # from Divoom MiniToo to MiniToo Toolbox. Keep the rolling release
            # unambiguous for both new visitors and old updater feed URLs.
            for stale_asset in \
              MiniToo-Toolbox-macos-universal.zip \
              MiniToo-Toolbox-macos-universal.zip.sha256 \
              Divoom-MiniToo-macos-universal.dmg \
              Divoom-MiniToo-macos-universal.dmg.sha256; do
              gh release delete-asset "${CHANNEL}-latest" "$stale_asset" --yes || true
            done
            gh release view "${CHANNEL}-latest" --json assets --jq '.assets[].name' | while IFS= read -r asset; do
              if [[ ( "$asset" == MiniToo-Toolbox-macos-universal-update-*.md || "$asset" == Divoom-MiniToo-macos-universal-update-*.md ) && "$asset" != "MiniToo-Toolbox-macos-universal-update-${GITHUB_RUN_NUMBER}.md" ]]; then
                gh release delete-asset "${CHANNEL}-latest" "$asset" --yes
              fi
            done
            gh release upload "${CHANNEL}-latest" MiniToo-Toolbox-macos-universal.dmg MiniToo-Toolbox-macos-universal.dmg.sha256 update-feed/MiniToo-Toolbox-macos-universal-update-${GITHUB_RUN_NUMBER}.md "update-feed/appcast-${CHANNEL}.xml" ffmpeg-source/ffmpeg-8.1.2.tar.xz --clobber
            gh release edit "${CHANNEL}-latest" --title "MiniToo Toolbox ${VERSION_PREFIX}.${GITHUB_RUN_NUMBER}" --prerelease --notes-file RELEASE_NOTES.md
          else
            gh release create "${CHANNEL}-latest" MiniToo-Toolbox-macos-universal.dmg MiniToo-Toolbox-macos-universal.dmg.sha256 update-feed/MiniToo-Toolbox-macos-universal-update-${GITHUB_RUN_NUMBER}.md "update-feed/appcast-${CHANNEL}.xml" ffmpeg-source/ffmpeg-8.1.2.tar.xz --title "MiniToo Toolbox ${VERSION_PREFIX}.${GITHUB_RUN_NUMBER}" --prerelease --notes-file RELEASE_NOTES.md
          fi
          count=0
          gh release list --limit 100 --json tagName --jq ".[] | select(.tagName | startswith(\"${CHANNEL}-update-\")) | .tagName" | while IFS= read -r tag; do
            count=$((count + 1))
            if [ "$count" -gt 3 ]; then
              gh release delete "$tag" --yes --cleanup-tag
            fi
          done
