name: Build main macOS app

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
  workflow_dispatch:
    inputs:
      release_channel:
        description: "Use personal-transition only for the final Personal-to-main bridge."
        required: false
        default: main
        type: choice
        options: [main, personal-transition]

permissions:
  contents: write

concurrency:
  group: main-release
  cancel-in-progress: true

jobs:
  validate-release-channel:
    name: Validate release channel
    runs-on: ubuntu-latest
    steps:
      - name: Reject an unsafe bridge invocation
        if: inputs.release_channel == 'personal-transition' && github.ref_name != 'personal'
        run: |
          echo "The Personal bridge may only be built from the preserved personal branch." >&2
          exit 1

  test:
    name: Run unit tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: swift test
        run: swift test

  build:
    name: Build ${{ matrix.label }} slice
    needs: [validate-release-channel, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64
            label: Apple Silicon
            runner: macos-15
          - arch: x86_64
            label: Intel
            runner: macos-15-intel
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6
      - name: Install NASM for optimized Intel FFmpeg
        if: matrix.arch == 'x86_64'
        run: brew install nasm
      - name: Restore/cache validated FFmpeg
        uses: actions/cache@v4
        with:
          path: |
            build/ffmpeg/ffmpeg
            build/ffmpeg/ffmpeg-8.1.2.tar.xz
            build/ffmpeg/.cache-manifest
          key: ffmpeg-cache-v1-${{ matrix.arch }}-ffmpeg-8.1.2-${{ hashFiles('tools/build-ffmpeg.sh') }}
      - name: Build LGPL-only FFmpeg
        run: bash tools/build-ffmpeg.sh
      - name: Build native app slice
        shell: bash
        run: |
          set -o pipefail
          CHANNEL="${{ inputs.release_channel == 'personal-transition' && 'personal' || 'main' }}"
          VERSION_PREFIX="${{ inputs.release_channel == 'personal-transition' && '0.1.0-alpha' || '0.2.0-alpha' }}"
          TRANSITION_FEED_URL=""
          TRANSITION_CHANNEL=""
          if [[ "$CHANNEL" == "personal" ]]; then
            TRANSITION_FEED_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/main-latest/appcast-main.xml"
            TRANSITION_CHANNEL="main"
          fi
          DIVOOM_ARCHS=${{ matrix.arch }} \
          DIVOOM_APP_VERSION="${VERSION_PREFIX}.${GITHUB_RUN_NUMBER}" \
          DIVOOM_BUILD_VERSION="${GITHUB_RUN_NUMBER}" \
          DIVOOM_SOURCE_REPOSITORY="${GITHUB_REPOSITORY}" \
          DIVOOM_SOURCE_BRANCH="$CHANNEL" \
          DIVOOM_UPDATE_CHANNEL="$CHANNEL" \
          DIVOOM_UPDATE_FEED_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${CHANNEL}-latest/appcast-${CHANNEL}.xml" \
          DIVOOM_TRANSITION_FEED_URL="$TRANSITION_FEED_URL" \
          DIVOOM_TRANSITION_CHANNEL="$TRANSITION_CHANNEL" \
          DIVOOM_SPARKLE_PUBLIC_KEY="BWqgCW8t6A6R+tPkslx9LKIuU620nJw3w1L1+JhEJTY=" \
          DIVOOM_BUILD_COMMIT="${GITHUB_SHA}" \
          DIVOOM_BUILD_RUN="${GITHUB_RUN_NUMBER}" \
          bash -x tools/build-divoom-app.sh 2>&1 | tee build-divoom-app.log
      - name: Preserve native build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-divoom-app-log-${{ matrix.arch }}
          path: build-divoom-app.log
          retention-days: 7
          if-no-files-found: warn
      - name: Archive native app slice
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "build/Divoom MiniToo.app" "Divoom-MiniToo-${{ matrix.arch }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: Divoom-MiniToo-${{ matrix.arch }}
          path: Divoom-MiniToo-${{ matrix.arch }}.zip
          retention-days: 30
      - uses: actions/upload-artifact@v4
        if: matrix.arch == 'arm64'
        with:
          name: ffmpeg-8.1.2-source
          path: build/ffmpeg/ffmpeg-8.1.2.tar.xz
          retention-days: 30

  release:
    name: Assemble and publish universal app
    needs: build
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements-release.txt
      - name: Install DMG layout builder
        run: python -m pip install -r requirements-release.txt
      - name: Resolve pinned Sparkle release tools
        run: swift package resolve
      - uses: actions/download-artifact@v5
        with:
          name: Divoom-MiniToo-arm64
          path: arm64
      - uses: actions/download-artifact@v5
        with:
          name: Divoom-MiniToo-x86_64
          path: x86_64
      - uses: actions/download-artifact@v5
        with:
          name: ffmpeg-8.1.2-source
          path: ffmpeg-source
      - name: Combine architecture-specific resources and binaries
        env:
          CHANNEL: ${{ inputs.release_channel == 'personal-transition' && 'personal' || 'main' }}
          VERSION_PREFIX: ${{ inputs.release_channel == 'personal-transition' && '0.1.0-alpha' || '0.2.0-alpha' }}
        run: |
          ditto -x -k arm64/Divoom-MiniToo-arm64.zip .
          mv "Divoom MiniToo.app" arm64.app
          ditto -x -k x86_64/Divoom-MiniToo-x86_64.zip .
          lipo -create \
            "arm64.app/Contents/MacOS/DivoomMiniToo" \
            "Divoom MiniToo.app/Contents/MacOS/DivoomMiniToo" \
            -output "Divoom MiniToo.app/Contents/MacOS/DivoomMiniToo"
          lipo -create \
            "arm64.app/Contents/Resources/tools/divoom-daemon" \
            "Divoom MiniToo.app/Contents/Resources/tools/divoom-daemon" \
            -output "Divoom MiniToo.app/Contents/Resources/tools/divoom-daemon"
          lipo -create \
            "arm64.app/Contents/Resources/tools/ffmpeg" \
            "Divoom MiniToo.app/Contents/Resources/tools/ffmpeg" \
            -output "Divoom MiniToo.app/Contents/Resources/tools/ffmpeg"
          codesign --force --deep --sign - "Divoom MiniToo.app"
          UPDATE_TAG="${CHANNEL}-update-${GITHUB_RUN_NUMBER}"
          UPDATE_NAME="Divoom-MiniToo-macos-universal-update-${GITHUB_RUN_NUMBER}.zip"
          UPDATE_DIR="update-feed"
          mkdir -p "$UPDATE_DIR"
          ditto -c -k --sequesterRsrc --keepParent "Divoom MiniToo.app" "$UPDATE_DIR/$UPDATE_NAME"
          cp RELEASE_NOTES.md "$UPDATE_DIR/${UPDATE_NAME%.zip}.md"
          printf '%s' "$DIVOOM_SPARKLE_PRIVATE_KEY" | \
            .build/artifacts/sparkle/Sparkle/bin/generate_appcast \
              --ed-key-file - \
              --maximum-versions 1 \
              --maximum-deltas 0 \
              --channel "$CHANNEL" \
              --download-url-prefix "https://github.com/${GITHUB_REPOSITORY}/releases/download/${UPDATE_TAG}/" \
              --full-release-notes-url "https://github.com/${GITHUB_REPOSITORY}/releases/tag/${CHANNEL}-latest" \
              -o "$UPDATE_DIR/appcast-${CHANNEL}.xml" \
              "$UPDATE_DIR"
          dmgbuild -s tools/dmgbuild-settings.py "Divoom MiniToo" Divoom-MiniToo-macos-universal.dmg
          shasum -a 256 Divoom-MiniToo-macos-universal.dmg > Divoom-MiniToo-macos-universal.dmg.sha256
        env:
          DIVOOM_SPARKLE_PRIVATE_KEY: ${{ secrets.DIVOOM_SPARKLE_PRIVATE_KEY }}
      - uses: actions/upload-artifact@v4
        with:
          name: Divoom-MiniToo-macos-universal
          path: |
            Divoom-MiniToo-macos-universal.dmg
            Divoom-MiniToo-macos-universal.dmg.sha256
            update-feed/Divoom-MiniToo-macos-universal-update-${{ github.run_number }}.zip
            update-feed/Divoom-MiniToo-macos-universal-update-${{ github.run_number }}.md
            update-feed/appcast-${{ inputs.release_channel == 'personal-transition' && 'personal' || 'main' }}.xml
            ffmpeg-source/ffmpeg-8.1.2.tar.xz
          retention-days: 7
      - name: Publish rolling prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          CHANNEL: ${{ inputs.release_channel == 'personal-transition' && 'personal' || 'main' }}
          VERSION_PREFIX: ${{ inputs.release_channel == 'personal-transition' && '0.1.0-alpha' || '0.2.0-alpha' }}
        run: |
          UPDATE_TAG="${CHANNEL}-update-${GITHUB_RUN_NUMBER}"
          if gh release view "$UPDATE_TAG" >/dev/null 2>&1; then
            gh release upload "$UPDATE_TAG" "update-feed/Divoom-MiniToo-macos-universal-update-${GITHUB_RUN_NUMBER}.zip" --clobber
          else
            gh release create "$UPDATE_TAG" "update-feed/Divoom-MiniToo-macos-universal-update-${GITHUB_RUN_NUMBER}.zip" --target "$GITHUB_SHA" --title "${CHANNEL} update ${GITHUB_RUN_NUMBER}" --prerelease --notes "Immutable Sparkle update archive for the ${CHANNEL} channel."
          fi
          if gh release view "${CHANNEL}-latest" >/dev/null 2>&1; then
            # The user-facing artifact changed from ZIP to DMG. Remove stale
            # ZIP assets so each rolling release has one unambiguous download.
            for stale_asset in Divoom-MiniToo-macos-universal.zip Divoom-MiniToo-macos-universal.zip.sha256; do
              gh release delete-asset "${CHANNEL}-latest" "$stale_asset" --yes || true
            done
            gh release view "${CHANNEL}-latest" --json assets --jq '.assets[].name' | while IFS= read -r asset; do
              if [[ "$asset" == Divoom-MiniToo-macos-universal-update-*.md && "$asset" != "Divoom-MiniToo-macos-universal-update-${GITHUB_RUN_NUMBER}.md" ]]; then
                gh release delete-asset "${CHANNEL}-latest" "$asset" --yes
              fi
            done
            gh release upload "${CHANNEL}-latest" Divoom-MiniToo-macos-universal.dmg Divoom-MiniToo-macos-universal.dmg.sha256 update-feed/Divoom-MiniToo-macos-universal-update-${GITHUB_RUN_NUMBER}.md "update-feed/appcast-${CHANNEL}.xml" ffmpeg-source/ffmpeg-8.1.2.tar.xz --clobber
            gh release edit "${CHANNEL}-latest" --title "Divoom MiniToo ${VERSION_PREFIX}.${GITHUB_RUN_NUMBER}" --prerelease --notes-file RELEASE_NOTES.md
          else
            gh release create "${CHANNEL}-latest" Divoom-MiniToo-macos-universal.dmg Divoom-MiniToo-macos-universal.dmg.sha256 update-feed/Divoom-MiniToo-macos-universal-update-${GITHUB_RUN_NUMBER}.md "update-feed/appcast-${CHANNEL}.xml" ffmpeg-source/ffmpeg-8.1.2.tar.xz --title "Divoom MiniToo ${VERSION_PREFIX}.${GITHUB_RUN_NUMBER}" --prerelease --notes-file RELEASE_NOTES.md
          fi
          count=0
          gh release list --limit 100 --json tagName --jq ".[] | select(.tagName | startswith(\"${CHANNEL}-update-\")) | .tagName" | while IFS= read -r tag; do
            count=$((count + 1))
            if [ "$count" -gt 3 ]; then
              gh release delete "$tag" --yes --cleanup-tag
            fi
          done
